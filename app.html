<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Counterdraft — audit a contract</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#16202b;--muted:#586472;--line:#e6e1d4;--navy:#10293f;--navy-d:#0a1c2d;--navy-50:#eef1f4;
        --gold:#a9863f;--gold-d:#8a6c2e;--gold-50:#f6f0e1;--paper:#f7f5ef;--card:#fff;
        --red:#9c2b22;--red-50:#f3e6e3;--amber:#856516;--amber-50:#f2ebd7;
        --serif:'Lora',Georgia,serif;--sans:'Inter',system-ui,Arial,sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--paper);line-height:1.6;}
  .wrap{max-width:820px;margin:0 auto;padding:0 20px;}
  a{color:inherit;text-decoration:none;}
  nav{border-bottom:1px solid var(--line);background:#fff;}
  .nav{display:flex;align-items:center;justify-content:space-between;height:62px;}
  .logo{display:inline-flex;align-items:center;gap:9px;font-family:var(--serif);font-weight:700;font-size:20px;color:var(--navy);}
  .logo b{color:var(--gold);}
  .back{font-size:14px;color:var(--muted);}
  h1{font-family:var(--serif);font-weight:700;color:var(--navy);font-size:30px;margin:28px 0 6px;}
  .sub{color:var(--muted);margin-bottom:22px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:18px;}
  label{font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;}
  select,textarea{width:100%;font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:8px;padding:10px;color:var(--ink);background:var(--paper);}
  textarea{height:200px;font-family:ui-monospace,Consolas,monospace;font-size:12.5px;resize:vertical;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px;}
  .row > div{flex:1;min-width:160px;}
  button{font-family:inherit;font-weight:600;font-size:15px;border:none;border-radius:8px;padding:12px 20px;cursor:pointer;}
  .primary{background:var(--navy);color:#fff;width:100%;}
  .primary:hover{background:var(--navy-d);}
  .primary:disabled{opacity:.5;cursor:default;}
  .link{background:transparent;border:1px solid var(--line);color:var(--navy);font-size:13px;padding:7px 12px;}
  .status{font-size:14px;color:var(--muted);margin-top:12px;min-height:20px;}
  .banner{background:var(--gold-50);border:1px solid #ece0c4;color:var(--gold-d);font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:14px;}
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
  .metric{background:var(--navy-50);border:1px solid #e1e6ec;border-radius:8px;padding:14px;}
  .metric .l{font-size:12px;color:var(--muted);}
  .metric .v{font-size:22px;font-weight:700;font-family:var(--serif);color:var(--navy);margin-top:2px;}
  .v.high{color:var(--red);}
  .issue{border:1px solid var(--line);border-left:4px solid #ccc;border-radius:0 8px 8px 0;padding:12px 15px;margin-bottom:10px;}
  .issue.critical{border-left-color:var(--red);}
  .issue.caution{border-left-color:var(--amber);}
  .issue.minor{border-left-color:#bbb;}
  .badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:4px;letter-spacing:.4px;text-transform:uppercase;}
  .badge.critical{background:var(--red-50);color:var(--red);}
  .badge.caution{background:var(--amber-50);color:var(--amber);}
  .badge.minor{background:#eee;color:#666;}
  .it{font-weight:600;color:var(--navy);}
  .ref{color:#a59a82;font-size:13px;}
  .q{font-style:italic;color:#666;font-size:13px;margin:6px 0;}
  .why{font-size:14px;color:var(--muted);}
  .ask{font-size:14px;margin-top:3px;}
  .ask b{color:var(--gold-d);}
  .letter{background:var(--gold-50);border:1px solid #ece0c4;border-radius:10px;padding:16px;font-size:14px;line-height:1.7;white-space:pre-wrap;}
  .foot{color:var(--muted);font-size:12px;text-align:center;padding:24px 0;}
  .hidden{display:none;}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--navy);border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:6px;}
  @keyframes s{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<nav><div class="wrap nav">
  <a class="logo" href="index.html">
    <svg width="28" height="28" viewBox="0 0 80 80"><rect x="2" y="2" width="76" height="76" rx="16" fill="#10293f"/><text x="40" y="53" text-anchor="middle" font-family="Georgia,serif" font-size="40" font-weight="700" fill="#f7f5ef">Cd</text><rect x="20" y="58" width="40" height="2.5" rx="1" fill="#a9863f"/></svg>
    <span>Counterdraft<b>.</b></span>
  </a>
  <a class="back" href="index.html">← Home</a>
</div></nav>

<div class="wrap">
  <h1>Audit a contract</h1>
  <div class="sub">Paste a contract, choose the jurisdiction, and get a risk report plus a ready-to-send counter-letter.</div>

  <div id="ai-banner" class="banner hidden"></div>

  <div class="card">
    <div class="row">
      <div style="flex:0 0 220px">
        <label for="juris">Jurisdiction / law</label>
        <select id="juris">
          <option value="us">United States</option>
          <option value="ua">Україна (ЦКУ)</option>
        </select>
      </div>
      <div style="flex:0 0 auto">
        <button class="link" type="button" onclick="loadSample()">Load sample</button>
      </div>
    </div>
    <label for="license">License key</label>
    <input id="license" type="text" placeholder="Paste the license key from your purchase email" style="width:100%;font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:8px;padding:10px;color:var(--ink);background:var(--paper);margin-bottom:14px">
    <label for="text">Contract text</label>
    <textarea id="text" placeholder="Paste the full contract text here..."></textarea>
    <button class="primary" id="run" style="margin-top:12px" onclick="runAudit()">Run audit</button>
    <div class="status" id="status"></div>
  </div>

  <div id="out" class="hidden">
    <div class="metrics">
      <div class="metric"><div class="l">Overall risk</div><div class="v" id="m-risk">—</div></div>
      <div class="metric"><div class="l">Critical</div><div class="v" id="m-crit">0</div></div>
      <div class="metric"><div class="l">Caution</div><div class="v" id="m-caut">0</div></div>
    </div>
    <div class="card">
      <div style="font-weight:600;color:var(--navy);margin-bottom:4px;" id="o-label"></div>
      <div class="why" id="o-summary"></div>
    </div>
    <div id="issues"></div>
    <div style="font-size:13px;font-weight:600;color:var(--muted);margin:8px 0">Counter-letter <button class="link" type="button" onclick="copyLetter()">Copy</button></div>
    <div class="letter" id="letter"></div>
  </div>

  <div class="foot">Counterdraft (working name) · Not legal advice; for high-stakes deals, confirm with counsel.</div>
</div>

<script>
  var SAMPLE_US = "MASTER SERVICES AGREEMENT\n3.1 Renews automatically for successive 12-month terms unless terminated 90 days prior.\n7.4 All deliverables and data shall remain the exclusive property of Vendor.\n9.2 Client shall indemnify Vendor from any and all claims without limitation.\n11.1 Vendor may terminate for convenience on 30 days' notice.\n14.2 Governed by the laws of Delaware.";
  var SAMPLE_UA = "ДОГОВІР ПРО НАДАННЯ ПОСЛУГ\n5.2 За прострочення оплати Замовник сплачує пеню 1% за кожен день прострочення.\n8.1 Виконавець має право в односторонньому порядку змінювати вартість послуг.\n9.3 Виконавець не несе відповідальності за будь-які збитки Замовника.\n11.2 Усі спори розглядаються за місцезнаходженням Виконавця.\n13.1 Сторони керуються Господарським кодексом України.";

  function loadSample(){
    document.getElementById('text').value =
      document.getElementById('juris').value === 'ua' ? SAMPLE_UA : SAMPLE_US;
  }

  fetch('/api/health').then(function(r){return r.json();}).then(function(d){
    if(d && d.ai_configured === false){
      var b=document.getElementById('ai-banner');
      b.classList.remove('hidden');
      b.textContent='Note: AI key not configured on the server yet.';
    }
  }).catch(function(){});

  function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}

  function runAudit(){
    var text=document.getElementById('text').value.trim();
    var juris=document.getElementById('juris').value;
    var key=document.getElementById('license').value.trim();
    var st=document.getElementById('status');
    var btn=document.getElementById('run');
    if(text.length<40){st.textContent='Please paste a longer contract first.';return;}
    if(!key){st.innerHTML='Please paste your license key. <a href="index.html#pricing">Get one here</a>.';return;}
    btn.disabled=true; st.innerHTML='<span class="spin"></span>Analyzing the contract — this can take 20–40 seconds...';
    document.getElementById('out').classList.add('hidden');
    fetch('/api/audit',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:text,jurisdiction:juris,license_key:key})})
    .then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j};});})
    .then(function(res){
      btn.disabled=false;
      if(!res.ok){var m=(res.j&&res.j.error)||'Something went wrong.';if(res.j&&res.j.need_license){m+=' <a href="index.html#pricing">Buy an audit</a>';}st.innerHTML=m;return;}
      render(res.j); st.textContent='';
    })
    .catch(function(e){btn.disabled=false;st.textContent='Network error: '+e;});
  }

  function render(res){
    var a=res.audit||{}; var c=a.counts||{};
    document.getElementById('m-risk').textContent=(a.overall_risk||'—');
    document.getElementById('m-risk').className='v'+((a.overall_risk==='high')?' high':'');
    document.getElementById('m-crit').textContent=c.critical||0;
    document.getElementById('m-caut').textContent=c.caution||0;
    document.getElementById('o-label').textContent=a.contract_label||'';
    document.getElementById('o-summary').textContent=a.summary||'';
    var order={critical:0,caution:1,minor:2};
    var issues=(a.issues||[]).slice().sort(function(x,y){return (order[x.severity]||3)-(order[y.severity]||3);});
    var html='';
    issues.forEach(function(i){
      var sev=i.severity||'minor';
      html+='<div class="issue '+sev+'">'+
        '<span class="badge '+sev+'">'+esc(sev)+'</span> '+
        '<span class="it">'+esc(i.title)+'</span> <span class="ref">· '+esc(i.clause_ref)+'</span>';
      if(i.quote){html+='<div class="q">"'+esc(i.quote)+'"</div>';}
      html+='<div class="why"><b>Why:</b> '+esc(i.why_it_matters)+'</div>'+
        '<div class="ask"><b>Demand:</b> '+esc(i.demand)+'</div></div>';
    });
    document.getElementById('issues').innerHTML=html;
    document.getElementById('letter').textContent=res.letter||'';
    document.getElementById('out').classList.remove('hidden');
    document.getElementById('out').scrollIntoView({behavior:'smooth',block:'start'});
  }

  function copyLetter(){
    var t=document.getElementById('letter').textContent;
    if(navigator.clipboard){navigator.clipboard.writeText(t);}
  }
</script>
</body>
</html>
